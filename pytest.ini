[pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Default CLI flags (overridable with -o or CLI args)
addopts = --tb=short --showlocals

# Logging
log_cli = false
log_level = WARNING

# Warning filters — suppress noise from dependencies while keeping ours visible
filterwarnings =
    # Ignore DeprecationWarning and PendingDeprecationWarning from third-party libs
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    # Make our own deprecation warnings loud
    error::FutureWarning
    # Ignore the "pkg_resources" deprecation from setuptools (noisy)
    ignore:.*pkg_resources.*:DeprecationWarning
    # Ignore pytest's own internal deprecation warnings
    ignore::pytest.PytestDeprecationWarning
    # ResourceWarning for unclosed files/sockets in deps
    ignore::ResourceWarning

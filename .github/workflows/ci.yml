name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: "**/requirements.txt"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            python3-pip python3-venv python3-tk \
            portaudio19-dev ffmpeg \
            libx11-dev libxtst-dev libxinerama-dev \
            xdotool tesseract-ocr \
            xvfb \
            --no-install-recommends
        # xvfb provides a virtual X11 display for headless CI (needed by pyautogui).

      - name: Install Python test dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          # Install only packages needed for tests — skip heavy ML libraries
          # (easyocr, faster-whisper, openwakeword, edge-tts) that aren't
          # imported by any unit test.
          pip install \
            pyautogui Pillow mss psutil requests numpy \
            pyperclip rich pydantic \
            pyttsx3 pytesseract python-xlib \
            pystray pynput plyer \
            pytest pytest-mock

      - name: Run unit tests (virtual display)
        run: |
          xvfb-run python -m pytest tests/ -v --tb=short
        env:
          PYTHONUNBUFFERED: 1
          AGENT_VOICE_FEEDBACK: "false"
